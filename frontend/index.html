<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; font-size: 14px; background: #f5f5f5; color: #222; }

    .navbar { background: #fff; border-bottom: 1px solid #ddd; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    .navbar a { margin-right: 14px; color: #4f46e5; text-decoration: none; }
    .navbar button { background: none; border: 1px solid #ddd; padding: 4px 12px; border-radius: 6px; cursor: pointer; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px; }
    .center-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; padding: 32px; border-radius: 10px; border: 1px solid #ddd; width: 360px; }
    .card h2 { text-align: center; margin-bottom: 4px; }
    .card h3 { text-align: center; font-weight: 400; color: #555; margin-bottom: 20px; }
    .card p { text-align: center; margin-top: 14px; color: #555; }

    .input { display: block; width: 100%; padding: 8px 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    select.input { background: #fff; }

    .btn { padding: 8px 16px; background: #4f46e5; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
    .btn-outline { padding: 8px 16px; background: #fff; color: #333; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; margin-right: 8px; }
    .btn-sm { padding: 3px 10px; background: #eee; border: none; border-radius: 4px; cursor: pointer; margin-right: 4px; font-size: 12px; }
    .btn-danger { background: #fee2e2; color: #dc2626; }

    .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .link-row { display: flex; gap: 12px; margin: 16px 0; }
    .form-box { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 14px 0; }
    .form-box h4 { margin-bottom: 12px; }

    .table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 16px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
    .table th { text-align: left; padding: 10px 12px; background: #f9f9f9; font-size: 12px; color: #666; text-transform: uppercase; border-bottom: 1px solid #eee; }
    .table td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; }

    .error { color: #dc2626; background: #fef2f2; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; }

    .badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; text-transform: capitalize; }
    .badge-pending   { background: #fef3c7; color: #b45309; }
    .badge-confirmed { background: #dbeafe; color: #1d4ed8; }
    .badge-packed    { background: #ede9fe; color: #6d28d9; }
    .badge-shipped   { background: #cffafe; color: #0e7490; }
    .badge-delivered { background: #dcfce7; color: #15803d; }
    .badge-cancelled { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
